<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- LOADING -->
  <div class="loader">
    <h1>FOOD PORTFOLIO</h1>
  </div>

  <!-- NAV -->
  <nav>
    <div>🍽 Portfolio</div>
    <div>Poster / Video / Goods</div>
  </nav>

  <!-- SECTION 1 -->
  <section class="section poster">
    <div class="text reveal">
      <h1>Poster Design</h1>
      <p>하늘빛 감성으로 제작된 맛집 포스터</p>
    </div>
    <div class="media reveal">
      <img src="images/poster.jpg">
    </div>
  </section>

  <!-- SECTION 2 -->
  <section class="section video">
    <div class="text reveal">
      <h1>Promo Video</h1>
      <p>브랜드 무드를 담은 영상 콘텐츠</p>
    </div>

    <div class="media reveal">
      <video id="video" src="video/promo.mp4"></video>
      <button id="playBtn">▶ Play</button>
    </div>
  </section>

  <!-- SECTION 3 -->
  <section class="section goods">
    <div class="text reveal">
      <h1>Goods Design</h1>
      <p>브랜드 아이덴티티 굿즈 제작</p>
    </div>
    <div class="media reveal">
      <img src="images/goods.jpg">
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
